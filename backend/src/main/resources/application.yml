server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dpms}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:dpms-helvino-secret-key-2024-very-long-and-secure-key-for-production}
    expiration: 86400000  # 24 hours
    refresh-expiration: 604800000  # 7 days
  trial-days: 5
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  company:
    name: Helvino Technologies Limited
    email: helvinotechltd@gmail.com
    website: helvino.org
    phone: "0703445756"

logging:
  level:
    com.helvino.dpms: DEBUG
    org.springframework.security: INFO
